<form action="https://formspree.io/f/mnjlodlb" method="POST" 
      style="max-width: 400px; margin: 20px auto; padding: 20px; background-color: darkgrey; border: 1px solid #ccc; border-radius: 5px;">
    
    <label style="display: flex; align-items: center; margin-bottom: 15px;"> 
        <span style="width: 100px;">Nombre:</span> 
        <input type="text" name="name" style="flex: 1; padding: 5px;" required> 
    </label>

    <label style="display: flex; align-items: center; margin-bottom: 15px;"> 
        <span style="width: 100px;">Teléfono:</span> 
        <input type="number" name="telefono" style="flex: 1; padding: 5px;" required> 
    </label>

    <label style="display: flex; align-items: center; margin-bottom: 15px;"> 
        <span style="width: 100px;">Email:</span> 
        <input type="email" name="email" style="flex: 1; padding: 5px;" required> 
    </label>

    <label style="display: flex; align-items: flex-start; margin-bottom: 15px;"> 
        <span style="width: 100px;">Mensaje:</span> 
        <textarea name="mensaje" style="flex: 1; height: 100px; padding: 5px;" required></textarea> 
    </label>

    <div style="text-align: right;">
        <button type="submit" style="padding: 10px 20px; cursor: pointer; background-color: #333; color: white; border: none; border-radius: 3px;">Send</button>
    </div>
</form>
