<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto de Pagina Web</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/encabezado.js"></script>
</head>

<body>

    <header class="main-header">
        <div id="encabezado"></div>
        <script src="menu-componente.js"></script>
    </header>

    <form action="https://formspree.io/f/mnjlodlb" method="POST" style="max-width: 400px;">
        <label style="display: flex; align-items: center; margin-bottom: 15px;">
            <span style="width: 100px;">Nombre:</span>
            <input type="text" name="name" style="flex: 1; padding: 5px;"required>
        </label>
        <label style="display: flex; align-items: center; margin-bottom: 15px;">
            <span style="width: 100px;">Teléfono:</span>
            <input type="number" name="telefono" style="width: 100%;"required>
        </label>

        <label style="display: flex; align-items: center; margin-bottom: 15px;">
            <span style="width: 100px;">Email:</span>
            <input type="email" name="email" style="width: 100%;"required>
        </label>

        <label style="display: flex; align-items: center; margin-bottom: 15px;">
            <span style="width: 100px;">Mensaje:</span>
            <textarea name="mensaje" style="width: 100%; height: 100px;"required></textarea>
        </label>

        <button type="submit" style="padding: 10px 20px; cursor: pointer;">Send</button>
    </form>
    <footer>
        <script src="js/Pie_pagina.js"></script>
    </footer>
</body>

</html>
